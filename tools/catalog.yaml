tools:
  - id: quant-data
    category: data
    stage: production
    runtime: go
    entrypoints:
      - path: tools/data/quant-data/cmd/quant-data/main.go
      - path: tools/data/quant-data/go.mod
    inputs:
      - stdin JSON command envelopes
      - tools/data/quant-data/contracts/market-data-policy.json
      - provider credentials under the local quant-data config directory
    outputs:
      - stdout JSON command envelopes
      - maintenance error envelopes for unavailable provider/config states
    dependsOn: []
    verification:
      - command: cd tools/data/quant-data && go test ./...

  - id: futures-trend-observation
    category: strategy
    stage: development
    runtime: python
    entrypoints:
      - path: tools/strategy/futures-trend-observation/analyze.py
      - path: tools/strategy/futures-trend-observation/trend_observation_engine.py
      - path: tools/strategy/futures-trend-observation/pi_agent_futures_trend_observation_driver.py
      - path: tools/strategy/futures-trend-observation/pi_agent_futures_trend_observation_report.py
      - path: tools/strategy/futures-trend-observation/contracts.json
      - path: .agents/skills/futures-trend-observation/scripts/analyze.py
    inputs:
      - quant-data get-price-series envelope
      - futures contract universe from tools/strategy/futures-trend-observation/contracts.json
      - symbol, market, start, end, and optional assetId parameters
    outputs:
      - trend observation JSON with 1d, 2d, 1w, and 2w timeframes
      - dated report folders under thoughts/shared/research/futures-trend-observation-agent
    dependsOn:
      - quant-data
    agentSkill: .agents/skills/futures-trend-observation/SKILL.md
    verification:
      - command: python3 -m unittest discover -s tools/strategy/futures-trend-observation -p '*_test.py'
      - command: python3 tools/strategy/futures-trend-observation/analyze.py --symbol RB9999 --market COMMODITY --fixture-provider --quant-data go --quant-data-cwd ./tools/data/quant-data --quant-data-arg run --quant-data-arg ./cmd/quant-data

  - id: futures-trend-observation-report-job
    category: job
    stage: development
    runtime: python
    entrypoints:
      - path: tools/jobs/futures-trend-observation-report.py
    inputs:
      - futures-trend-observation contract universe and report CLI flags
    outputs:
      - dated batch reports under thoughts/shared/research/futures-trend-observation-agent
    dependsOn:
      - futures-trend-observation
      - quant-data
    schedule:
      recommended: manual or external cron after market close
    verification:
      - command: python3 tools/jobs/futures-trend-observation-report.py --dry-run --limit 1
